<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaféSync Push</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBxqE9HSkXGUlujX6x5xcvsz5rPxNCOq44",
            authDomain: "fris-f38da.firebaseapp.com",
            projectId: "fris-f38da",
            messagingSenderId: "1048171458578",
            appId: "1:1048171458578:web:0f77ace7c71f92bded28cb"
        };

        // Initiera Firebase
        const app = initializeApp(firebaseConfig);
        const messaging = getMessaging(app);

        // Gör funktionen tillgänglig för knappen
        window.initPush = async () => {
            try {
                const permission = await Notification.requestPermission();
                if (permission !== "granted") {
                    alert("Du måste tillåta notiser i webbläsaren!");
                    return;
                }

                // Hämta din unika Token
                // OBS: Ersätt DIN_VAPID_KEY med den du hittar i Firebase Console (Cloud Messaging -> Web Push certificates)
                const token = await getToken(messaging, { 
                    vapidKey: "DIN_VAPID_KEY_HÄR" 
                });

                if (token) {
                    console.log("Din Token:", token);
                    document.getElementById("token-display").innerText = token;
                    alert("Token genererad! Kopiera den från skärmen.");
                } else {
                    alert("Ingen token hittades. Kolla konsolen.");
                }
            } catch (err) {
                console.error("Ett fel uppstod:", err);
            }
        };

        // Lyssna på notiser när fliken är ÖPPEN
        onMessage(messaging, (payload) => {
            console.log("Notis mottagen i öppen flik:", payload);
            alert(`${payload.notification.title}: ${payload.notification.body}`);
        });
    </script>
</head>
<body class="bg-slate-100 flex items-center justify-center h-screen">

<div class="text-center p-8 bg-white rounded-2xl shadow-lg max-w-md">
    <h1 class="text-3xl font-bold mb-4">CaféSync 🔔</h1>
    <p class="text-gray-600 mb-6">Klicka på knappen för att aktivera push-notiser för denna enhet.</p>
    
    <button onclick="initPush()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-8 py-4 rounded-xl transition-all">
        Aktivera notiser
    </button>

    <div class="mt-6 p-4 bg-gray-50 rounded-lg border border-dashed border-gray-300">
        <p class="text-[10px] uppercase font-bold text-gray-400 mb-2">Din enhets Token:</p>
        <p id="token-display" class="text-[10px] text-blue-600 break-all font-mono">Ingen token än...</p>
    </div>
</div>

</body>
</html>
