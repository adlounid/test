<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelSaver AI-Search</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 20px; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        input { width: 80%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ddd; }
        button { background: #00b894; color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #results { margin-top: 20px; text-align: left; max-width: 400px; margin-left: auto; margin-right: auto; }
        .flight-card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid #0984e3; }
    </style>
</head>
<body>

    <h1>TravelSaver ✈️</h1>

    <div class="card">
        <h3>Hitta billigaste flyget</h3>
        <input type="text" id="origin" placeholder="Från (t.ex. ARN)" value="ARN">
        <input type="text" id="destination" placeholder="Till (t.ex. BCN)">
        <button onclick="getCheapFlights()">SÖK BILLIGASTE RESA</button>
    </div>

    <div id="results"></div>

    <script>
        // DIN API-NYCKEL
        const API_TOKEN = "16de7bdcc51b164aecaa99d04c4cc609";

        async function getCheapFlights() {
            const origin = document.getElementById('origin').value;
            const dest = document.getElementById('destination').value;
            const resultsDiv = document.getElementById('results');

            resultsDiv.innerHTML = "Söker efter priser...";

            try {
                // Vi använder Aviasales/Travelpayouts API för billigaste priser per månad
                const response = await fetch(`https://api.travelpayouts.com/v1/prices/cheap?origin=${origin}&destination=${dest}&token=${API_TOKEN}&currency=SEK`, {
                    method: 'GET'
                });

                const json = await response.json();
                
                if (json.success && Object.keys(json.data).length > 0) {
                    displayResults(json.data[dest]);
                } else {
                    resultsDiv.innerHTML = "Inga priser hittades just nu. Testa en annan stad (använd flygplatskoder som STO, NYC, LON).";
                }
            } catch (error) {
                resultsDiv.innerHTML = "Fel vid sökning. Se till att du kör via HTTPS (t.ex. Netlify).";
                console.error(error);
            }
        }

        function displayResults(data) {
            const resultsDiv = document.getElementById('results');
            let html = "<h4>Billigaste träffar:</h4>";
            
            // API:et returnerar objekt med olika biljetter
            for (let key in data) {
                const flight = data[key];
                html += `
                    <div class="flight-card">
                        <strong>Pris: ${flight.price} kr</strong><br>
                        <span>Flygbolag: ${flight.airline}</span><br>
                        <small>Avgång: ${new Date(flight.departure_at).toLocaleDateString()}</small><br>
                        <button style="margin-top:5px; background:#0984e3; padding:5px 10px; font-size:12px;" onclick="window.open('https://www.aviasales.com')">VISA BILJETT</button>
                    </div>
                `;
            }
            resultsDiv.innerHTML = html;
        }
    </script>
</body>
</html>
